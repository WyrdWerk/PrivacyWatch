name: Setup bulk redirect

on:
  workflow_dispatch:

concurrency:
  group: setup-bulk-redirect
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Configure pages.dev to custom domain bulk redirect
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAGES_DEV_HOST: ${{ vars.PAGES_DEV_HOST }}
          POLICYWATCH_URL: ${{ vars.POLICYWATCH_URL }}
        run: node scripts/bulk-redirect.mjs
